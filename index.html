            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1332&q=80');
            background-size: cover;
            background-position: center;

            justify-content: center;
            color: white;
        }
        .hero h1 { font-size: 3.5rem; font-weight: 800; }
        .btn-custom {
            padding: 15px 40px;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
        }
        .navbar { background-color: #2e7d32 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">TERRALEASE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Beranda</a></li>
                    
                    <li class="nav-item"><a class="nav-link" href="api/data_ihpb_bps.php" id="link-statistik">Statistik Pertanian</a></li>
                    <li class="nav-item"><a class="nav-link" href="api/daftar_alat.php" id="link-katalog">Katalog</a></li>
                    
                    <li class="nav-item ms-lg-3" id="auth-buttons">
                        <a href="api/login.php" class="btn btn-outline-light btn-sm rounded-pill px-3 me-2">Login</a>
                        <a href="api/register.php" class="btn btn-warning btn-sm rounded-pill px-3">Daftar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="text-center container">
            <h1 id="hero-title">Modernisasi Pertanian Anda</h1>
            <p id="hero-desc">Temukan alat pertanian terbaik dengan mudah bersama TERRALEASE</p>
            <a href="api/login.php" id="hero-btn" class="btn btn-warning btn-custom shadow-lg text-dark">Login Untuk Memesan</a>
        </div>
    </header>

    <script>
        const linkBps = document.getElementById('link-statistik');
        const linkKatalog = document.getElementById('link-katalog');
        const authButtons = document.getElementById('auth-buttons');
        const heroTitle = document.getElementById('hero-title');
        const heroDesc = document.getElementById('hero-desc');
        const heroBtn = document.getElementById('hero-btn');

        // Fungsi pembaca status login dari Cookie
        function getCookie(name) {
            let matches = document.cookie.match(new RegExp(
                "(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"
            ));
            return matches ? decodeURIComponent(matches[1]) : undefined;
        }

        const username = getCookie('username');

        if (username) {
            // --- JIKA USER SUDAH LOGIN ---
            authButtons.innerHTML = `
                <span class="text-white me-3">Halo, <strong>${username}</strong></span>
                <a href="api/Proses/logout.php" class="btn btn-danger btn-sm rounded-pill px-3">Logout</a>
            `;
            
            heroTitle.innerText = `Halo, ${username}!`;
            heroDesc.innerText = "Siap untuk memodernisasi lahan pertanian Anda hari ini?";
            heroBtn.innerText = "Lihat Katalog Alat";
            heroBtn.href = "api/daftar_alat.php"; // Diarahkan masuk ke folder api/
            heroBtn.className = "btn btn-success btn-custom shadow-lg text-white"; 
        } else {
            // --- JIKA BELUM LOGIN ---
            // Proteksi hanya mengunci tombol Katalog dan BPS saja
            const proteksiAkses = (e) => {
                e.preventDefault(); 
                alert("Silakan Login terlebih dahulu untuk mengakses fitur ini!");
                window.location.href = "api/login.php"; // Diarahkan masuk ke folder api/
            };

            if(linkBps) linkBps.addEventListener('click', proteksiAkses);
            if(linkKatalog) linkKatalog.addEventListener('click', proteksiAkses);
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
