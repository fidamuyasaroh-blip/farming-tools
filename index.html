<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERRALEASE - Beranda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1332&q=80');
            background-size: cover; background-position: center; height: 100vh;
            display: flex; align-items: center; justify-content: center; color: white;
        }
        .navbar { background-color: #2e7d32 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">TERRALEASE</a>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="link-statistik">Statistik Pertanian</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="link-katalog">Katalog</a></li>
                    <li class="nav-item ms-lg-3">
                        <a href="login.html" class="btn btn-outline-light btn-sm rounded-pill px-3 me-2">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="text-center container">
            <h1>Modernisasi Pertanian Anda</h1>
            <p>Temukan alat pertanian terbaik dengan mudah bersama TERRALEASE</p>
            <a href="login.html" class="btn btn-warning fw-bold rounded-pill px-5 py-3">LOGIN UNTUK MEMESAN</a>
        </div>
    </header>

    <script>
        // Karena di Vercel tidak ada database, kita buat simulasi: belum login
        const proteksiAkses = (e) => {
            e.preventDefault(); // Cegah pindah halaman
            alert("Silakan Login terlebih dahulu untuk melihat fitur ini!");
            window.location.href = "login.html"; // Lempar ke halaman login
        };

        // Pasang satpam di menu navigasi
        document.getElementById('link-statistik').addEventListener('click', proteksiAkses);
        document.getElementById('link-katalog').addEventListener('click', proteksiAkses);
    </script>
</body>
</html>
